name: Android CI - Build APK

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build:
    name: Build Photo APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}-${{ hashFiles('**/*.gradle*','**/*.kts') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build photo debug APK
        run: ./gradlew :app:assemblePhotoDebug --no-daemon --stacktrace

      - name: Upload photo APK
        uses: actions/upload-artifact@v4
        with:
          name: photo-apk
          path: app/build/outputs/apk/photo/debug/*.apk
